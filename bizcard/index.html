<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Виталий — визитка</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f0c;
      --panel: #131a15;
      --accent: #7ee787;
      --text: #e6f1e9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: var(--panel);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    .avatar {
      width: 84px;
      height: 84px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.4rem;
    }
    .role {
      margin: 0 0 1.25rem;
      color: var(--accent);
      font-size: 0.95rem;
    }
    .quote {
      margin: 0 0 1.75rem;
      font-style: italic;
      opacity: 0.85;
      line-height: 1.4;
    }
    .contact {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">В</div>
    <h1>Виталий</h1>
    <p class="role">Будущий фронтенд-разработчик</p>
    <p class="quote">«Делаю с умом, не забывая детали»</p>
    <a class="contact" href="https://t.me/VetlTech" target="_blank" rel="noopener">Написать в Telegram — @VetlTech</a>
  </main>
</body>
</html>
