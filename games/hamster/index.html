<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Хомяк — аркада</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <span class="bg-suit bg-suit-1">♠</span>
    <span class="bg-suit bg-suit-2">♥</span>
    <span class="bg-suit bg-suit-3">♦</span>
    <span class="bg-suit bg-suit-4">♣</span>
  </div>

  <main class="arcade">
    <a class="back-link" href="/">&larr; все игры</a>
    <h1>Хомяк</h1>

    <section class="game-panel">
      <div class="hud">
        <div class="hud-row">
          <div class="field">
            <label for="nickname">Ник (3–12, латиница/цифры)</label>
            <input id="nickname" type="text" minlength="3" maxlength="12" pattern="[A-Za-z0-9]{3,12}" value="Player1" />
          </div>
          <span class="moves-box">Ходы: <span id="moves">0</span></span>
        </div>
        <div class="hud-row">
          <button id="start-btn" type="button">Начать игру</button>
          <button id="forfeit-btn" type="button" disabled>Сдаться</button>
          <span class="score-box">Счёт: <span id="score">0</span></span>
        </div>
      </div>

      <p id="status-message">Введи ник и нажми «Начать игру».
Клик по карте — выбрать, клик по стопке или колонке — переложить туда.
Собери все карты по мастям от туза до короля.</p>

      <div class="board">
        <div class="top-row">
          <div class="pile stock" id="stock-pile"></div>
          <div class="pile waste" id="waste-pile"></div>
          <div class="spacer"></div>
          <div class="pile foundation" data-suit="♠" id="foundation-♠"></div>
          <div class="pile foundation red" data-suit="♥" id="foundation-♥"></div>
          <div class="pile foundation red" data-suit="♦" id="foundation-♦"></div>
          <div class="pile foundation" data-suit="♣" id="foundation-♣"></div>
        </div>
        <div class="tableau" id="tableau">
          <div class="column" data-col="0"></div>
          <div class="column" data-col="1"></div>
          <div class="column" data-col="2"></div>
          <div class="column" data-col="3"></div>
          <div class="column" data-col="4"></div>
          <div class="column" data-col="5"></div>
          <div class="column" data-col="6"></div>
        </div>
      </div>
    </section>

    <section class="leaderboard">
      <button id="leaderboard-toggle" class="leaderboard-toggle" type="button">Таблица лидеров ▾</button>
      <div id="leaderboard-panel" class="leaderboard-panel">
        <ol id="leaderboard-list"></ol>
      </div>
    </section>
  </main>

  <script type="module" src="game.js"></script>
</body>
</html>
